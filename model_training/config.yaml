models:
  - distilbert-base-uncased
  - huawei-noah/TinyBERT_General_4L_312D
  - albert-base-v2
  - google/mobilebert-uncased

training:
  epochs: 3
  batch_size: 16
  learning_rate: 2.0e-5
  max_length: 128
  threshold: 0.80
  seed: 42

data:
  path: malicious-urls.csv
  url_column: url
  label_column: result
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15

output:
  checkpoint_dir: checkpoints/
  onnx_dir: exports/onnx/
  tflite_dir: exports/tflite/
  metrics_csv: results/metrics.csv
