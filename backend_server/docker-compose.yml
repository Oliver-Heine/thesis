services:
  flask-api:
    build:
      context: ./flask-api
      dockerfile: Dockerfile
    container_name: flask-api
    ports:
      - "8090:8090"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qr-quishing-backend
    ports:
      - "8080:8082"
    # Run as UID/GID 1000 (non-root)
    user: "1000:1000"
    environment:
      - FLASK_API_URL=http://flask-api:8090
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      # Spring Boot and Playwright need writable temp space
      - /tmp:size=256m,mode=1777
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
