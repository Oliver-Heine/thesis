# Server
server.port=8082
server.shutdown=graceful

# Rate limiting (read by UrlValidatorController)
app.rate-limit.max-requests=10
app.rate-limit.window-seconds=60

# Local .env support (optional). We check a few common working dirs:
# - project root: ./.env
# - running from build output: ../.env
# - running from repo root: ./backend_server/.env
spring.config.import=optional:file:./.env[.properties],optional:file:../.env[.properties],optional:file:./backend_server/.env[.properties]

# Map .env/env vars into Spring properties
vt.api.key=${VT_API_KEY:}
GEMINI_API_KEY=${GEMINI_API_KEY}

logging.level.root=INFO
logging.level.com.thesis.qrquishing=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# Spring
spring.application.name=qr-quishing-detector
# Actuator (for Docker healthcheck)
management.endpoints.web.exposure.include=health
# Disable unnecessary auto-configurations
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Inference
# Keep this on classpath; models with external data are extracted to temp at runtime.
app.inference.model-path=classpath:/models/bert-base-uncased.onnx
