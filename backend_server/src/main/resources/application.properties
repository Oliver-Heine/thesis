# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=8080
server.shutdown=graceful

# ──────────────────────────────────────────────
# Rate limiting (read by UrlValidatorController)
# ──────────────────────────────────────────────
app.rate-limit.max-requests=10
app.rate-limit.window-seconds=60

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.thesis.qrquishing=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# ──────────────────────────────────────────────
# Spring
# ──────────────────────────────────────────────
spring.application.name=qr-quishing-detector
# Disable unnecessary auto-configurations
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
